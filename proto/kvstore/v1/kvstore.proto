syntax = "proto3";

package kvstore.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/rayzhao/grpc-kv-store/pkg/kvstore/v1;kvstorev1";

service KVStore {
  // 获取一个 key 的值
  rpc Get(GetRequest) returns (GetResponse);
  // 写入一个 key-value
  rpc Put(PutRequest) returns (PutResponse);
  // 删除一个 key
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  // 列出所有 key（或按前缀过滤）
  rpc List(ListRequest) returns (ListResponse);
  // 订阅一个 key 的变化，实时推送更新
  rpc Watch(WatchRequest) returns (stream WatchResponse);
}

// TODO: 定义 WatchRequest — 客户端想监听哪个 key？
message WatchRequest {
  string id = 1;
}

// TODO: 定义 WatchResponse — 每次 key 变化时推送什么？
message WatchResponse {
  string id = 1;
  string val = 2;
  string action = 3;
}

message GetRequest {
  string id = 1;
}

message GetResponse {
  string value = 1;
}

message PutRequest {
  string id = 1;
  string value = 2;
}

message PutResponse {
  string value = 1;
}

message DeleteRequest {
  string id = 1;
}

message DeleteResponse {
  bool deleted = 1;
}

message ListRequest {}

message ListResponse {
  repeated Pack items = 1;
}

message Pack {
  string id = 1;
  string value = 2;
}
